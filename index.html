<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorer Android Dev | Projects</title>
    <style>
        :root {
            --bg: #1a1a1a;
            --container: #202020;
            --card: #2b2b2b;
            --accent: #00ffcc;
            --text: #ffffff;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI Variable', 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--container);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        h1 { color: var(--accent); font-weight: 600; margin-top: 0; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 25px;
        }

        .project-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            text-decoration: none;
            color: var(--text);
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100px;
        }

        .project-card:hover {
            border-color: var(--accent);
            background: #353535;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 255, 204, 0.1);
        }

        .project-name {
            font-weight: 600;
            font-size: 1.1rem;
            word-break: break-all;
        }

        .loading { color: var(--accent); font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>System / Projects</h1>
    <p>Автоматический список репозиториев из папки <code>/projects</code></p>
    
    <div id="projects-grid" class="grid">
        <div class="loading">Сканирование директории...</div>
    </div>
</div>

<script>
    // НАСТРОЙКИ (поменяй на свои)
    const username = 'explorer-android-dev';
    const repo = 'explorer-android-dev.github.io';
    const folderPath = 'projects';

    async function fetchProjects() {
        const grid = document.getElementById('projects-grid');
        
        try {
            // Стучимся в GitHub API, чтобы получить содержимое папки
            const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${folderPath}`);
            const data = await response.json();

            grid.innerHTML = ''; // Очищаем лоадер

            if (!Array.isArray(data)) {
                grid.innerHTML = '<div>Папка проектов пуста или не найдена.</div>';
                return;
            }

            // Фильтруем только папки (dir)
            const folders = data.filter(item => item.type === 'dir');

            folders.forEach(project => {
                const card = document.createElement('a');
                card.className = 'project-card';
                // Твоя ссылка: https://explorer-android-dev.github.io/projects/имя_папки
                card.href = `https://${username}.github.io/${folderPath}/${project.name}`;
                
                card.innerHTML = `
                    <div class="project-name">📂 ${project.name}</div>
                `;
                
                grid.appendChild(card);
            });

        } catch (error) {
            console.error(error);
            grid.innerHTML = '<div style="color: red;">Ошибка API: Проверь название репозитория или лимиты GitHub.</div>';
        }
    }

    fetchProjects();
</script>

</body>
</html>
