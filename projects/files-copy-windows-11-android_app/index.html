<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Details | Explorer Android Dev</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI Variable Display', 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            width: 90%;
            max-width: 500px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            background: #252525;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
        }
        .breadcrumb {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        h1 {
            color: #00ffcc; 
            margin: 10px 0;
            font-size: 1.8rem;
            word-break: break-all;
        }
        .description {
            color: #aaaaaa;
            font-size: 1rem;
            margin-bottom: 25px;
        }
        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 25px 0;
            text-align: left;
        }
        .status-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.9rem;
        }
        .btn {
            display: block;
            padding: 14px;
            background-color: #00ffcc;
            color: #1a1a1a;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 20px;
        }
        .btn:hover {
            background-color: #00cca3;
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
        }
        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .back-link:hover {
            color: #00ffcc;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="breadcrumb">System / Projects / <span id="project-slug">...</span></div>
        
        <h1 id="project-title">Загрузка...</h1>
        <p class="description">Информационная страница проекта и загрузка дистрибутивов.</p>
        
        <div class="status-grid">
            <div class="status-item">📦 <b>Beta:</b> Доступно</div>
            <div class="status-item">🚀 <b>Release:</b> Ожидается</div>
            <div class="status-item">🛠 <b>Platform:</b> Android</div>
            <div class="status-item">🛡 <b>License:</b> MIT</div>
        </div>

        <a id="download-btn" href="#" class="btn">Скачать Beta APK</a>

        <a href="../../" class="back-link">← Вернуться к списку</a>

        <p style="font-size: 0.7rem; margin-top: 30px; color: #555;">2026 © Explorer Android Dev</p>
    </div>

    <script>
        // Получаем имя папки из URL
        const path = window.location.pathname;
        const pathSegments = path.split('/').filter(segment => segment.length > 0);
        const projectName = pathSegments[pathSegments.length - 1] || "Unknown Project";

        // Делаем имя более читаемым (заменяем тире и подчеркивания на пробелы)
        const displayTitle = projectName.replace(/[-_]/g, ' ');

        // Подставляем данные в HTML
        document.getElementById('project-slug').innerText = projectName;
        document.getElementById('project-title').innerText = displayTitle;
        document.title = displayTitle + " | Explorer Android Dev";

        // Генерируем ссылку на скачивание (путь: текущая папка/download/app-beta.apk)
        document.getElementById('download-btn').href = "download/app-beta.apk";
    </script>
</body>
</html>
